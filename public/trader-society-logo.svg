<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark rounded background -->
  <rect width="100" height="100" rx="22" fill="#0d1117"/>
  <!-- Outer green circle -->
  <circle cx="50" cy="46" r="34" fill="none" stroke="#3ecf5a" stroke-width="2.5"/>
  <!-- Candlestick bars (left side) -->
  <rect x="20" y="38" width="4" height="14" rx="1" fill="#3ecf5a"/>
  <line x1="22" y1="34" x2="22" y2="38" stroke="#3ecf5a" stroke-width="1.5"/>
  <line x1="22" y1="52" x2="22" y2="56" stroke="#3ecf5a" stroke-width="1.5"/>
  <rect x="27" y="42" width="4" height="10" rx="1" fill="#3ecf5a"/>
  <line x1="29" y1="38" x2="29" y2="42" stroke="#3ecf5a" stroke-width="1.5"/>
  <line x1="29" y1="52" x2="29" y2="55" stroke="#3ecf5a" stroke-width="1.5"/>
  <!-- Candlestick bars (right side) -->
  <rect x="69" y="36" width="4" height="14" rx="1" fill="#3ecf5a"/>
  <line x1="71" y1="32" x2="71" y2="36" stroke="#3ecf5a" stroke-width="1.5"/>
  <line x1="71" y1="50" x2="71" y2="54" stroke="#3ecf5a" stroke-width="1.5"/>
  <rect x="76" y="40" width="4" height="12" rx="1" fill="#3ecf5a"/>
  <line x1="78" y1="36" x2="78" y2="40" stroke="#3ecf5a" stroke-width="1.5"/>
  <line x1="78" y1="52" x2="78" y2="56" stroke="#3ecf5a" stroke-width="1.5"/>
  <!-- TS letters -->
  <!-- T -->
  <text x="34" y="54" font-family="Arial, sans-serif" font-weight="900" font-size="22" fill="white">T</text>
  <!-- S with upward arrow styling -->
  <text x="50" y="54" font-family="Arial, sans-serif" font-weight="900" font-size="22" fill="#3ecf5a">S</text>
  <!-- Small upward arrow on S -->
  <polyline points="62,36 66,32 70,36" fill="none" stroke="#3ecf5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="66" y1="32" x2="66" y2="42" stroke="#3ecf5a" stroke-width="2" stroke-linecap="round"/>
  <!-- TRADER SOCIETY text -->
  <text x="50" y="88" font-family="Arial, sans-serif" font-weight="700" font-size="7.5" fill="white" text-anchor="middle" letter-spacing="2">TRADER</text>
  <text x="50" y="97" font-family="Arial, sans-serif" font-weight="400" font-size="6" fill="#94a3b8" text-anchor="middle" letter-spacing="3">SOCIETY</text>
</svg>
